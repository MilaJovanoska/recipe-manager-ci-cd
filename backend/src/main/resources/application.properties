spring.application.name=recipe-manager-backend

server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/recipe_manager}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:recipe_manager_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:recipe_manager_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration