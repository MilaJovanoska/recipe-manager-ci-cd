apiVersion: v1
kind: Service
metadata:
  name: recipe-manager-backend
  namespace: recipe-manager
  labels:
    app.kubernetes.io/name: recipe-manager-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: recipe-manager-app
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: recipe-manager-backend
    app.kubernetes.io/component: backend
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080